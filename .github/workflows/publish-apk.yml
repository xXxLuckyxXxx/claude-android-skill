name: Publish APK download

# Publishes the committed, already-signed AIGamesFPS.apk as the repo's "latest"
# Release asset. Release downloads are served with
#   Content-Disposition: attachment; filename=AIGamesFPS.apk
# which mobile browsers treat as a single clean download — unlike a
# raw.githubusercontent.com link.
#
# The APK is NOT rebuilt here — we attach the file already in the repo, so the
# signing key (and seamless-update behaviour) is unchanged. The release is
# recreated each run so its date and title always reflect the newest build.
# Runs whenever the committed APK (or this workflow) changes on main, and can
# also be run manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'AIGamesFPS.apk'
      - '.github/workflows/publish-apk.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish committed APK as a fresh 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f AIGamesFPS.apk || { echo "AIGamesFPS.apk missing at repo root"; exit 1; }
          VC=$(grep '^versionCode=' AIGamesFPSPrototype/native-apk/version.properties | cut -d= -f2 | tr -d '[:space:]')
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          TITLE="AIGames FPS — build $VC"
          NOTES="versionCode $VC · aktualisiert $DATE. Direkter Einmal-Download (als Datei-Anhang). Gleicher Signierschluessel -> nahtloses Update ueber eine aeltere Version. Android-Tipp: falls der Download 'haengt', unten 'Trotzdem behalten' tippen; im In-App-Browser ggf. den Link in Chrome oeffnen."
          # Recreate so the release date + title always reflect the newest build.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest AIGamesFPS.apk --latest --title "$TITLE" --notes "$NOTES"
