name: Build Neon Racer APK

on:
  push:
    branches:
      - claude/2-5d-racing-game-wepc8a
    paths:
      - 'game/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        working-directory: game
        run: chmod +x gradlew

      - name: Generate signing keystore
        working-directory: game
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -storepass android -keypass android \
            -alias neonracer \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Neon Racer, OU=Game, O=Fable, L=NA, ST=NA, C=US"

      - name: Build signed release APK
        working-directory: game
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE="$PWD/release.keystore" \
            -PRELEASE_STORE_PASSWORD=android \
            -PRELEASE_KEY_ALIAS=neonracer \
            -PRELEASE_KEY_PASSWORD=android \
            --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp game/app/build/outputs/apk/release/app-release.apk dist/NeonRacer.apk
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonRacer-APK
          path: dist/NeonRacer.apk
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: neon-racer-v1.0.${{ github.run_number }}
          name: Neon Racer v1.0 (build ${{ github.run_number }})
          body: |
            2.5D OutRun-style racing game. Download **NeonRacer.apk** below and
            install on Android (allow installation from unknown sources).
          files: dist/NeonRacer.apk
          target_commitish: ${{ github.sha }}
