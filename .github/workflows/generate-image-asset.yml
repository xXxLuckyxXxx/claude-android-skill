name: Generate Image-AI Asset

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt for the image
        required: true
        default: Cinematic key art banner for a mobile low-poly survival FPS called AIGames FPS, abandoned European village at dusk, fog, street lamps, subtle rain, glowing windows, first-person weapon silhouette, distant zombie figures, premium mobile game promo art, blue-orange lighting, no gore, no watermark.
        type: string
      output_path:
        description: Where to write the generated image
        required: true
        default: assets/imagegen/final/readme-hero.png
        type: string
      size:
        description: Image size
        required: true
        default: 1536x1024
        type: choice
        options:
          - 1024x1024
          - 1536x1024
          - 1024x1536
          - 2048x1152
      quality:
        description: Generation quality
        required: true
        default: high
        type: choice
        options:
          - low
          - medium
          - high
          - auto
      commit_asset:
        description: Commit generated asset back to this branch
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenAI SDK
        run: python -m pip install --upgrade openai

      - name: Verify secret is configured
        run: test -n "$OPENAI_API_KEY"

      - name: Generate image asset
        run: |
          mkdir -p "$(dirname "${{ inputs.output_path }}")"
          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          from openai import OpenAI

          prompt = """${{ inputs.prompt }}"""
          output_path = Path("""${{ inputs.output_path }}")
          output_path.parent.mkdir(parents=True, exist_ok=True)

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          result = client.images.generate(
              model="gpt-image-2",
              prompt=prompt,
              size="${{ inputs.size }}",
              quality="${{ inputs.quality }}",
              output_format="png",
              n=1,
          )

          image_b64 = result.data[0].b64_json
          output_path.write_bytes(base64.b64decode(image_b64))
          print(f"Wrote {output_path}")
          PY

      - name: Upload generated image artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-image-asset
          path: ${{ inputs.output_path }}
          if-no-files-found: error

      - name: Commit generated asset
        if: ${{ inputs.commit_asset }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_path }}"
          git commit -m "Add generated image asset" || exit 0
          git push
